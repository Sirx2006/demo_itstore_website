<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>IT STORE</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
        }
        .product-card {
            border-radius: 15px;
            transition: 0.3s;
        }
        .product-card:hover {
            transform: scale(1.05);
        }
    </style>
</head>

<body>

<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand">🛒 IT STORE</span>
</nav>

<div class="container mt-4">

    <div class="row">

        <!-- สินค้า 1 -->
        <div class="col-md-3 mb-4">
            <div class="card product-card p-3">
                <img src="{{ url_for('static', filename='img/gaming_keyboard.jpg') }}" class="card-img-top">
                <h5 class="mt-3">Gaming Keyboard</h5>
                <p class="text-danger">1,500 บาท</p>
                <button class="btn btn-primary w-100">เพิ่มลงตะกร้า</button>
            </div>
        </div>

        <!-- สินค้า 2 -->
        <div class="col-md-3 mb-4">
            <div class="card product-card p-3">
                <img src="{{ url_for('static', filename='img/rgb_mouse.jpg') }}" class="card-img-top" alt="RGB Mouse">
                <h5 class="mt-3">RGB Mouse</h5>
                <p class="text-danger">800 บาท</p>
                <button class="btn btn-primary w-100">เพิ่มลงตะกร้า</button>
            </div>
        </div>

        <!-- สินค้า 3 -->
        <div class="col-md-3 mb-4">
            <div class="card product-card p-3">
                <img src="{{ url_for('static', filename='img/gaming_headset.jpg') }}" class="card-img-top" alt="Headset Gaming">
                <h5 class="mt-3">Headset Gaming</h5>
                <p class="text-danger">1,200 บาท</p>
                <button class="btn btn-primary w-100">เพิ่มลงตะกร้า</button>
            </div>
        </div>

        <!-- สินค้า 4 -->
        <div class="col-md-3 mb-4">
            <div class="card product-card p-3">
                <img src="{{ url_for('static', filename='img/laptop.jpg') }}" class="card-img-top" alt="Laptop ASUS">
                <h5 class="mt-3">Laptop ASUS</h5>
                <p class="text-danger">25,000 บาท</p>
                <button class="btn btn-primary w-100">เพิ่มลงตะกร้า</button>
            </div>
        </div>

        <!-- สินค้า 5 -->
        <div class="col-md-3 mb-4">
            <div class="card product-card p-3">
                <img src="{{ url_for('static', filename='img/monitor.jpg') }}" class="card-img-top" alt="Monitor Gaming">
                <h5 class="mt-3">Monitor Gaming</h5>
                <p class="text-danger">12,000 บาท</p>
                <button class="btn btn-primary w-100">เพิ่มลงตะกร้า</button>
            </div>
        </div>

        <!-- สินค้า 6 -->
        <div class="col-md-3 mb-4">
            <div class="card product-card p-3">
                <img src="{{ url_for('static', filename='img/controller.jpg') }}" class="card-img-top" alt="Controller Gaming">
                <h5 class="mt-3">Controller Gaming</h5>
                <p class="text-danger">1,500 บาท</p>
                <button class="btn btn-primary w-100">เพิ่มลงตะกร้า</button>
            </div>
        </div>

        <!-- สินค้า 7 -->
        <div class="col-md-3 mb-4">
            <div class="card product-card p-3">
                <img src="{{ url_for('static', filename='img/microphone_gaming.jpg') }}" class="card-img-top" alt="Microphone Gaming">
                <h5 class="mt-3">Microphone Gaming</h5>
                <p class="text-danger">4,900 บาท</p>
                <button class="btn btn-primary w-100">เพิ่มลงตะกร้า</button>
            </div>
        </div>

        <!-- สินค้า 8 -->
        <div class="col-md-3 mb-4">
            <div class="card product-card p-3">
                <img src="{{ url_for('static', filename='img/mousepad.jpg') }}" class="card-img-top" alt="Mousepad Gaming">
                <h5 class="mt-3">Mousepad Gaming</h5>
                <p class="text-danger">1,500 บาท</p>
                <button class="btn btn-primary w-100">เพิ่มลงตะกร้า</button>
            </div>
        </div>

    </div>

</div>

</body>
</html>
